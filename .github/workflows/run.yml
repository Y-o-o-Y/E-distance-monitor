name: Auto Update Quant Dashboard

on:
  workflow_dispatch:
    inputs:
      ticker_input:
        description: '要計算的個股 Ticker'
        required: false
        default: 'MU'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance numpy pandas plotly

    - name: Run calculation script
      run: |
        # 讀取網頁端傳入的 ticker，並作為參數傳給 Python 腳本
        python update_dashboard.py "${{ github.event.inputs.ticker_input }}"

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        # 只有在 index.html 有變動時才 commit，避免 workflow 報錯
        git diff-index --quiet HEAD || git commit -m "Auto update dashboard for ${{ github.event.inputs.ticker_input }}"
        git push
